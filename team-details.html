<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>გუნდის სრული ინფორმაცია</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            background: #050505; 
            color: white; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            padding: 0; 
            margin: 0;
            line-height: 1.6;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        .back-link { 
            color: #00ff85; 
            text-decoration: none; 
            font-weight: bold; 
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 20px 0;
            transition: 0.3s;
        }
        .back-link:hover { transform: translateX(-5px); color: white; }

        /* გუნდის მთავარი ბანერი */
        .team-banner {
            background: linear-gradient(135deg, #111 0%, #0a0a0a 100%);
            border-radius: 24px;
            padding: 40px;
            display: flex;
            align-items: center;
            gap: 40px;
            border: 1px solid #222;
            margin-bottom: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #team-logo {
            width: 150px;
            height: 150px;
            object-fit: contain;
            filter: drop-shadow(0 0 15px rgba(0,255,133,0.3));
        }
        .team-details-text h1 {
            margin: 0;
            font-size: 3rem;
            color: #00ff85;
            text-transform: uppercase;
            letter-spacing: -1px;
        }
        .meta-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        .meta-item {
            color: #bbb;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .meta-item strong { color: #00ff85; }

        /* შემადგენლობის სექცია */
        .section-title {
            font-size: 1.8rem;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 12px;
            padding-left: 10px;
            border-left: 4px solid #00ff85;
        }

        .squad-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 20px; 
        }

        .player-card { 
            background: #111; 
            padding: 20px; 
            border-radius: 16px; 
            position: relative;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid #222;
        }
        .player-card:hover { 
            transform: translateY(-8px);
            background: #161616;
            border-color: #00ff8555;
            box-shadow: 0 10px 20px rgba(0,255,133,0.1);
        }

        .shirt-number {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 1.8rem;
            font-weight: 900;
            opacity: 0.1;
            font-style: italic;
        }

        .player-main { display: flex; align-items: center; gap: 15px; }
        
        .p-icon { 
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .p-name { margin: 0; font-size: 1.15rem; color: #fff; font-weight: 600; }
        .p-pos { font-weight: 800; font-size: 0.7rem; margin: 4px 0; letter-spacing: 1.5px; }
        .p-extra { font-size: 0.85rem; color: #777; display: flex; gap: 10px; margin-top: 6px; }

        .coach-card {
            grid-column: 1 / -1;
            background: linear-gradient(90deg, #1a1a1a, #111);
            border-left: 6px solid #fff !important;
        }

        @media (max-width: 768px) {
            .team-banner { flex-direction: column; text-align: center; padding: 30px; }
            .team-details-text h1 { font-size: 2rem; }
            .meta-grid { justify-items: center; }
        }
    </style>
</head>
<body>

    <div class="container">
        <a href="index.html" class="back-link">← უკან დაბრუნება</a>
        
        <div id="header-section" class="team-banner" style="display: none;">
            <img id="team-logo" src="" alt="">
            <div class="team-details-text">
                <h1 id="team-title">იტვირთება...</h1>
                <div class="meta-grid">
                    <div class="meta-item" id="meta-venue"></div>
                    <div class="meta-item" id="meta-founded"></div>
                    <div class="meta-item" id="meta-colors"></div>
                    <div class="meta-item" id="meta-web"></div>
                </div>
            </div>
        </div>

        <h2 class="section-title">🏃 შემადგენლობა</h2>
        
        <div id="squad-list" class="squad-grid">
            </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const teamId = urlParams.get('id');

        async function loadFullDetails() {
            if (!teamId || teamId === "undefined") {
                document.getElementById('team-title').innerText = "შეცდომა: ID არასწორია";
                return;
            }

            try {
                const response = await fetch(`https://localhost:7053/api/Teams/details/${teamId}`);
                if (!response.ok) throw new Error("მონაცემები ვერ მოიძებნა");
                
                const team = await response.json();
                
                // 1. ჰედერის შევსება
                document.getElementById('team-title').innerText = team.name;
                if(team.crest) document.getElementById('team-logo').src = team.crest;
                
                document.getElementById('meta-venue').innerHTML = `🏟️ <strong>სტადიონი:</strong> ${team.venue || 'N/A'}`;
                document.getElementById('meta-founded').innerHTML = `📅 <strong>დაარსდა:</strong> ${team.founded || 'N/A'}`;
                document.getElementById('meta-colors').innerHTML = `🎨 <strong>ფერები:</strong> ${team.clubColors || 'N/A'}`;
                
                if(team.website) {
                    document.getElementById('meta-web').innerHTML = `🌐 <a href="${team.website}" target="_blank" style="color:#00ff85; text-decoration:none;">ოფიციალური საიტი</a>`;
                }

                document.getElementById('header-section').style.display = 'flex';

                const squadList = document.getElementById('squad-list');
                let html = '';

                // 2. მწვრთნელის დამატება
                if (team.coach && team.coach.name) {
                    html += `
                        <div class="player-card coach-card">
                            <div class="player-main">
                                <div class="p-icon" style="background: rgba(255,255,255,0.1);">
                                    <img src="https://img.icons8.com/ios-filled/50/ffffff/manager.png" width="30">
                                </div>
                                <div>
                                    <h3 class="p-name">${team.coach.name}</h3>
                                    <p class="p-pos" style="color: #fff;">HEAD COACH / მთავარი მწვრთნელი</p>
                                    <p class="p-extra">🏳️ ${team.coach.nationality || 'N/A'}</p>
                                </div>
                            </div>
                        </div>
                    `;
                }

                // 3. ფეხბურთელები
                if (team.squad && team.squad.length > 0) {
                    html += team.squad.map(player => {
                        // ასაკი
                        let age = "N/A";
                        if (player.dateOfBirth) {
                            age = new Date().getFullYear() - new Date(player.dateOfBirth).getFullYear();
                        }

                        // ფერები პოზიციის მიხედვით
                        let color = "#555";
                        if (player.position?.includes('Goalkeeper')) color = "#ffcc00"; 
                        else if (player.position?.includes('Defence')) color = "#007bff";    
                        else if (player.position?.includes('Midfield')) color = "#00ff85";   
                        else if (player.position?.includes('Offence')) color = "#ff4d4d";    

                        return `
                            <div class="player-card" style="border-left: 5px solid ${color};">
                                <div class="shirt-number" style="color: ${color};">
                                    ${player.shirtNumber ? '#' + player.shirtNumber : ''}
                                </div>
                                <div class="player-main">
                                    <div class="p-icon" style="background: ${color}15;">
                                        
                                    </div>
                                    <div>
                                        <h3 class="p-name">${player.name}</h3>
                                        <p class="p-pos" style="color: ${color};">${player.position?.toUpperCase() || 'PLAYER'}</p>
                                        <div class="p-extra">
                                            <span>🎂 ${age} წ.</span>
                                            <span>🏳️ ${player.nationality}</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        `;
                    }).join('');
                } else {
                    html += "<p style='grid-column: 1/-1; text-align: center; padding: 40px; color: #666;'>ინფორმაცია შემადგენლობაზე არ მოიძებნა.</p>";
                }

                squadList.innerHTML = html;

            } catch (e) {
                console.error(e);
                document.getElementById('team-title').innerText = "შეცდომა ჩატვირთვისას";
            }
        }

        loadFullDetails();
    </script>
</body>
</html>
